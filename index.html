<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YTDL Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Heebo', sans-serif;
            background: radial-gradient(circle at center, #1e1b4b 0%, #0f172a 100%);
        }
    </style>
</head>
<body class="min-h-screen text-slate-100 flex flex-col justify-between">

    <header class="p-6 text-center">
        <h1 class="text-4xl font-extrabold tracking-tight bg-gradient-to-r from-red-500 to-amber-500 bg-clip-text text-transparent">
            YTDL Downloader
        </h1>
        <p class="text-slate-400 mt-2 text-sm">הורדת שירים וסרטונים מיוטיוב ישירות ללא חסימות</p>
    </header>

    <main class="flex-grow flex items-center justify-center px-4">
        <div class="max-w-xl w-full bg-slate-900/80 backdrop-blur-md p-8 rounded-2xl border border-slate-800 shadow-2xl">
            
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">הדבק קישור מיוטיוב:</label>
                    <input type="text" id="youtubeUrl" placeholder="https://www.youtube.com/watch?v=..." 
                           class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl focus:ring-2 focus:ring-red-500 focus:border-transparent outline-none text-left text-sm" dir="ltr">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button onclick="startDownload('audio')" id="btn-mp3" class="py-3 px-6 bg-gradient-to-r from-red-600 to-red-500 hover:from-red-500 hover:to-red-400 font-bold rounded-xl shadow-lg transition-all active:scale-95 flex justify-center items-center gap-2">
                        <span>🎵 הורד MP3</span>
                    </button>
                    <button onclick="startDownload('video')" id="btn-mp4" class="py-3 px-6 bg-gradient-to-r from-amber-600 to-amber-500 hover:from-amber-500 hover:to-amber-400 font-bold rounded-xl shadow-lg transition-all active:scale-95 flex justify-center items-center gap-2">
                        <span>🎥 הורד MP4</span>
                    </button>
                </div>

                <div id="statusArea" class="hidden space-y-4 pt-4 border-t border-slate-800/50">
                    <div class="flex justify-between items-center text-sm">
                        <span id="statusText" class="text-slate-400 font-medium">מעבד...</span>
                        <span id="statusSpinner" class="animate-spin rounded-full h-5 w-5 border-2 border-red-500 border-t-transparent"></span>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <footer class="p-6 text-center text-xs text-slate-600">
        נבנה עם 💙 עבור Kol Popper
    </footer>

    <script>
        // פונקציה לחילוץ ה-ID של הסרטון מהקישור
        function extractVideoId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        async function startDownload(mode) {
            const urlInput = document.getElementById('youtubeUrl').value.trim();
            const videoId = extractVideoId(urlInput);

            if (!videoId) {
                alert('בבקשה תדביק קישור יוטיוב תקין!');
                return;
            }

            const statusArea = document.getElementById('statusArea');
            const statusText = document.getElementById('statusText');
            const statusSpinner = document.getElementById('statusSpinner');
            const btnMp3 = document.getElementById('btn-mp3');
            const btnMp4 = document.getElementById('btn-mp4');

            statusArea.classList.remove('hidden');
            statusSpinner.classList.remove('hidden');
            statusText.innerText = "מתחבר לשרת עוקף חסימות... (זה לוקח כמה שניות)";
            btnMp3.disabled = true;
            btnMp4.disabled = true;

            // רשימת שרתי גיבוי של Invidious במידה ואחד עמוס
            const instances = [
                "https://invidious.nerdvpn.de",
                "https://yewtu.be",
                "https://inv.tux.im",
                "https://invidious.no-logs.com"
            ];

            let success = false;

            for (let instance of instances) {
                try {
                    statusText.innerText = `מנסה דרך שרת גיבוי...`;
                    const res = await fetch(`${instance}/api/v1/videos/${videoId}`);
                    if (!res.ok) continue;

                    const data = await res.json();
                    
                    let targetUrl = "";
                    let extension = "mp4";

                    if (mode === 'audio') {
                        // סינון קובצי סאונד בלבד
                        const audioStreams = data.adaptiveFormats.filter(f => f.type.startsWith('audio/'));
                        if (audioStreams.length > 0) {
                            targetUrl = audioStreams[0].url;
                            extension = "mp3";
                        }
                    } else {
                        // וידאו משולב באיכות הכי טובה
                        const videoStreams = data.formatStreams;
                        if (videoStreams.length > 0) {
                            targetUrl = videoStreams[videoStreams.length - 1].url;
                        }
                    }

                    if (targetUrl) {
                        statusText.innerText = "ההורדה החלה!";
                        statusSpinner.classList.add('hidden');

                        // יצירת לינק להורדה ישירה משרתי הוידאו
                        const a = document.createElement('a');
                        a.href = targetUrl;
                        a.target = "_blank"; // פותח בחלון חדש להורדה חלקה
                        a.download = `${data.title}.${extension}`;
                        document.body.appendChild(a);
                        a.click();
                        a.remove();

                        success = true;
                        break; // הצלחנו, יוצאים מהלולאה
                    }
                } catch (e) {
                    console.log("Failed with instance:", instance, e);
                }
            }

            if (!success) {
                alert('כל שרתי הגיבוי עמוסים כרגע. אנא נסה שוב בעוד מספר רגעים.');
                statusText.innerText = "ההורדה נכשלה.";
                statusSpinner.classList.add('hidden');
            }

            btnMp3.disabled = false;
            btnMp4.disabled = false;
        }
    </script>
</body>
</html>
